<svg viewBox="0 0 760 600" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="ST7735S to Arduino Nano wiring diagram">
  <style>
    text { font-family: Arial, Helvetica, sans-serif; }
    .title { font-size: 23px; font-weight: bold; fill: #1a1a1a; }
    .sub   { font-size: 14px; fill: #555; }
    .plabel{ font-size: 15px; font-weight: bold; }
    .board { font-size: 15px; font-weight: bold; fill: #eafcff; }
    .disp  { font-size: 15px; font-weight: bold; fill: #dbe7ff; }
    .leg   { font-size: 14px; fill: #333; }
    .legb  { font-size: 15px; font-weight: bold; fill: #111; }
    .pinw  { stroke-width: 7; fill: none; stroke-linecap: round; }
  </style>

  <rect x="0" y="0" width="760" height="600" fill="#f7f5ef"/>

  <text class="title" x="380" y="42" text-anchor="middle">ST7735S  &#8594;  Arduino Nano</text>
  <text class="sub"   x="380" y="66" text-anchor="middle">Same logical pins as the Uno &#8212; only D13's physical position differs</text>

  <!-- Display module -->
  <rect x="60" y="120" width="200" height="330" rx="12" fill="#14213a" stroke="#0a1220" stroke-width="2"/>
  <rect x="62" y="122" width="196" height="24" fill="#0a1220"/>
  <text x="160" y="139" text-anchor="middle" font-size="15" font-weight="bold" fill="#cfe3ff">ST7735S TFT</text>
  <rect x="78" y="158" width="104" height="250" rx="4" fill="#25406e" stroke="#0a1220"/>
  <rect x="86" y="166" width="88" height="226" fill="#2f4f86"/>
  <text x="130" y="428" text-anchor="middle" font-size="12" fill="#9db8e0">128 &#215; 160</text>

  <!-- Arduino board -->
  <rect x="520" y="120" width="200" height="330" rx="12" fill="#00858f" stroke="#045e66" stroke-width="2"/>
  <rect x="522" y="122" width="196" height="24" fill="#04646c"/>
  <text x="620" y="139" text-anchor="middle" font-size="15" font-weight="bold" fill="#eafcff">ARDUINO NANO</text>
  <rect x="600" y="110" width="40" height="14" rx="2" fill="#c2cad2" stroke="#8a929a"/>

  <!-- Wires + pads: order top->bottom is crossing-free -->
  <!-- LED -> 3V3 (pink) -->
  <line class="pinw" x1="260" y1="170" x2="520" y2="170" stroke="#e06c9f"/>
  <circle cx="260" cy="170" r="7" fill="#e06c9f"/><circle cx="260" cy="170" r="3" fill="#fff"/>
  <circle cx="520" cy="170" r="7" fill="#e06c9f"/><circle cx="520" cy="170" r="3" fill="#fff"/>
  <text class="disp"  x="248" y="175" text-anchor="end">LED</text>
  <text class="board" x="532" y="175" text-anchor="start">3V3</text>

  <!-- SCK -> D13 (gold) -->
  <line class="pinw" x1="260" y1="208" x2="520" y2="208" stroke="#d4a017"/>
  <circle cx="260" cy="208" r="7" fill="#d4a017"/><circle cx="260" cy="208" r="3" fill="#fff"/>
  <circle cx="520" cy="208" r="7" fill="#d4a017"/><circle cx="520" cy="208" r="3" fill="#fff"/>
  <text class="disp"  x="248" y="213" text-anchor="end">SCK</text>
  <text class="board" x="532" y="213" text-anchor="start">D13</text>

  <!-- SDA -> D11 (orange) -->
  <line class="pinw" x1="260" y1="246" x2="520" y2="246" stroke="#e0820b"/>
  <circle cx="260" cy="246" r="7" fill="#e0820b"/><circle cx="260" cy="246" r="3" fill="#fff"/>
  <circle cx="520" cy="246" r="7" fill="#e0820b"/><circle cx="520" cy="246" r="3" fill="#fff"/>
  <text class="disp"  x="248" y="251" text-anchor="end">SDA</text>
  <text class="board" x="532" y="251" text-anchor="start">D11</text>

  <!-- A0 -> D8 (purple) -->
  <line class="pinw" x1="260" y1="284" x2="520" y2="284" stroke="#9b59b6"/>
  <circle cx="260" cy="284" r="7" fill="#9b59b6"/><circle cx="260" cy="284" r="3" fill="#fff"/>
  <circle cx="520" cy="284" r="7" fill="#9b59b6"/><circle cx="520" cy="284" r="3" fill="#fff"/>
  <text class="disp"  x="248" y="289" text-anchor="end">A0</text>
  <text class="board" x="532" y="289" text-anchor="start">D8</text>

  <!-- RST -> D9 (blue) -->
  <line class="pinw" x1="260" y1="322" x2="520" y2="322" stroke="#4a80d0"/>
  <circle cx="260" cy="322" r="7" fill="#4a80d0"/><circle cx="260" cy="322" r="3" fill="#fff"/>
  <circle cx="520" cy="322" r="7" fill="#4a80d0"/><circle cx="520" cy="322" r="3" fill="#fff"/>
  <text class="disp"  x="248" y="327" text-anchor="end">RST</text>
  <text class="board" x="532" y="327" text-anchor="start">D9</text>

  <!-- CS -> D10 (green) -->
  <line class="pinw" x1="260" y1="360" x2="520" y2="360" stroke="#3aa655"/>
  <circle cx="260" cy="360" r="7" fill="#3aa655"/><circle cx="260" cy="360" r="3" fill="#fff"/>
  <circle cx="520" cy="360" r="7" fill="#3aa655"/><circle cx="520" cy="360" r="3" fill="#fff"/>
  <text class="disp"  x="248" y="365" text-anchor="end">CS</text>
  <text class="board" x="532" y="365" text-anchor="start">D10</text>

  <!-- GND -> GND (black) -->
  <line class="pinw" x1="260" y1="398" x2="520" y2="398" stroke="#2b2b2b"/>
  <circle cx="260" cy="398" r="7" fill="#2b2b2b"/><circle cx="260" cy="398" r="3" fill="#fff"/>
  <circle cx="520" cy="398" r="7" fill="#2b2b2b"/><circle cx="520" cy="398" r="3" fill="#fff"/>
  <text class="disp"  x="248" y="403" text-anchor="end">GND</text>
  <text class="board" x="532" y="403" text-anchor="start">GND</text>

  <!-- VCC -> 5V (red) -->
  <line class="pinw" x1="260" y1="436" x2="520" y2="436" stroke="#d64545"/>
  <circle cx="260" cy="436" r="7" fill="#d64545"/><circle cx="260" cy="436" r="3" fill="#fff"/>
  <circle cx="520" cy="436" r="7" fill="#d64545"/><circle cx="520" cy="436" r="3" fill="#fff"/>
  <text class="disp"  x="248" y="441" text-anchor="end">VCC *</text>
  <text class="board" x="532" y="441" text-anchor="start">5V *</text>

  <!-- Divider -->
  <line x1="40" y1="468" x2="720" y2="468" stroke="#d8d2c2" stroke-width="2"/>

  <!-- Left legend: pin aliases -->
  <text class="legb" x="60" y="492">Pin name aliases (varies by board)</text>
  <text class="leg"  x="60" y="514">SDA = MOSI = DIN&#160;&#160;&#183;&#160;&#160;SCK = SCL = CLK</text>
  <text class="leg"  x="60" y="534">A0 = DC = RS&#160;&#160;&#183;&#160;&#160;RST = RESET&#160;&#160;&#183;&#160;&#160;CS = CE</text>
  <text class="leg"  x="60" y="554">LED = BL = BLK&#160;&#160;&#183;&#160;&#160;MISO / SDO left unconnected</text>
  <text class="leg"  x="60" y="578">* VCC: 5V on regulator boards, 3.3V on bare boards.</text>

  <!-- Right block: D13 location on Nano -->
  <text class="legb" x="430" y="492">D13 (SCK) location on the Nano</text>
  <g>
    <rect x="452" y="504" width="40" height="88" rx="5" fill="#00858f" stroke="#045e66"/>
    <rect x="462" y="496" width="20" height="10" rx="2" fill="#c2cad2" stroke="#8a929a"/>
    <!-- left column pins (D0..D12 side) -->
    <circle cx="457" cy="516" r="2.2" fill="#0a3b3f"/>
    <circle cx="457" cy="528" r="2.2" fill="#0a3b3f"/>
    <circle cx="457" cy="540" r="2.2" fill="#0a3b3f"/>
    <circle cx="457" cy="552" r="2.2" fill="#0a3b3f"/>
    <circle cx="457" cy="564" r="2.2" fill="#0a3b3f"/>
    <circle cx="457" cy="576" r="2.2" fill="#0a3b3f"/>
    <!-- right column pins (A0..A7 / 3V3 side) -->
    <circle cx="487" cy="516" r="3.6" fill="#d4a017"/>
    <circle cx="487" cy="528" r="2.2" fill="#0a3b3f"/>
    <circle cx="487" cy="540" r="2.2" fill="#0a3b3f"/>
    <circle cx="487" cy="552" r="2.2" fill="#0a3b3f"/>
    <circle cx="487" cy="564" r="2.2" fill="#0a3b3f"/>
    <circle cx="487" cy="576" r="2.2" fill="#0a3b3f"/>
    <text x="498" y="520" text-anchor="start" font-size="11" font-weight="bold" fill="#b8860b">13</text>
  </g>
  <text class="leg" x="516" y="516">Top of the far-side</text>
  <text class="leg" x="516" y="534">row, nearest USB.</text>
  <text class="leg" x="516" y="552">Not beside D12 &#8212;</text>
  <text class="leg" x="516" y="570">it is on the other side.</text>
</svg>
